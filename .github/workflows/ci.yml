name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: gofmt check
        run: test -z "$(gofmt -l .)"
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: static build
        run: CGO_ENABLED=0 go build -o /tmp/sshbox .
